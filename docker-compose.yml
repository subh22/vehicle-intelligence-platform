version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vehicle-intelligence-platform:latest
    container_name: vehicle_api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      - DEBUG=${DEBUG:-false}
    volumes:
      # Mount local model weights and data so you don't retrain inside the container
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
